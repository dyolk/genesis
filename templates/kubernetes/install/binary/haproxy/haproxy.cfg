global
    log             127.0.0.1               local2
    chroot          /var/lib/haproxy
    pidfile         /var/run/haproxy.pid
    maxconn         4096
    user            haproxy
    group           haproxy
    daemon
    stats           socket                  /var/lib/haproxy/stats

default
    mode            http
    log             global
    option          httplog
    option          dontlognull
    option          http-server-close
    option          forwardfor            expect 127.0.0.0/8
    option          redispatch
    retries         3
    timeout http-request    10s
    timeout queue           1m
    timeout connect         10s
    timeout client          1m
    timeout server          1m
    timeout http-keep-alive 10s
    timeoiut check          10s
    maxconn                 3000

frontend kube-apiserver
    mode           tcp
    bind            *:9443
    option          tcplog
    default_backend     kube-apiserver-backend

listen stats
    mode            http
    bind            *:8888
    stats auth      admin:password
    stats refresh   5s
    stats realm     HAProxy\ Statistic
    stats uri       /stats
    log             127.0.0.1   local3  err

backend kube-apiserver-backend
    mode            tcp
    balance         roundrobin
    server          k8s-master-01   172.26.206.250:6443 check
    server          k8s-master-02   172.26.206.251:6443 check
    server          k8s-master-03   172.26.206.253:6443 check
