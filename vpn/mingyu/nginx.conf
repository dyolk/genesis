

#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}

stream {
    upstream ssh_backend {
        server 192.168.0.0:60022;
    }

    server {
        listen                60022;
        proxy_pass            ssh_backend;
        proxy_connect_timeout 1h;
        proxy_timeout         3h;
    }
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;

    #keepalive_timeout  0;
    keepalive_timeout  65;


    server {
        listen       80;
        server_name  localhost;

        #charset koi8-r;

        #access_log  logs/host.access.log  main;

        location / {
            root   html;
            index  index.html index.htm;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

    server {
        listen 443 ssl;
        server_name vpn.example.com;

        ssl_certificate ../cert/cert.crt;
        ssl_certificate_key ../cert/cert.key;

        location / {
            proxy_pass https://192.168.0.0/;

            proxy_set_header Host $http_host;
            proxy_set_header Cookie $http_cookie;
            proxy_cookie_path / "/; HTTPOnly; SameSite=Lax";
            proxy_set_header Referer "https://192.168.0.0";
            proxy_set_header Origin https://192.168.0.0;

            proxy_redirect https://192.168.0.0/ https://vpn.example.com/;
            proxy_redirect / https://vpn.example.com/;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_ssl_name 192.168.0.0;

            proxy_set_header Accept-Encoding "";

            proxy_http_version 1.1;
            proxy_set_header Upgrader $http_upgrade;
            proxy_set_header Connection "upgrade";

            sub_filter 'https://192.168.0.0' 'https://vpn.example.com';
            sub_filter_once off;
            sub_filter_types text/css text/xml text/javascript application/javascript applicatin/json;
        }
    }
}






















