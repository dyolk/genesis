<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><script>
!function(){
	website_title = ''
	max_name_length = 60
	enable_readme = true
	omit_icon_if_emoji = true
	datetime_format = '%d-%b-%Y %H:%M'

	var dom = {
		element: null,
		get: function (o) {
			var obj = Object.create(this)
			obj.element = (typeof o == "object") ? o : document.createElement(o)
			return obj
		},
		add: function (o) {
			var obj = dom.get(o)
			this.element.appendChild(obj.element)
			return obj
		},
		text: function (t) {
			this.element.appendChild(document.createTextNode(t))
			return this
		},
		html: function (s) {
			this.element.innerHTML = s
			return this
		},
		attr: function (k, v) {
			this.element.setAttribute(k, v)
			return this
		}
	}

	head = dom.get(document.head)
	head.add('link').attr('rel', 'manifest').attr('href', '/manifest.json')
	head.add('meta').attr('charset', 'utf-8')
	head.add('meta').attr('charset', 'utf-8')
	head.add('meta').attr('name', 'viewport').attr('content', 'width=device-width,initial-scale=1')


	var bodylines = document.body.innerHTML.split('\n')
	document.body.innerHTML = ''

	titlehtml = document.title.replace(/\/$/, '').split('/').slice(1).reduce(function(acc, v, i, a) {
		return acc + '<a href="/' + a.slice(0, i+1).join('/') + '/">' + v + '</a>/'
	}, '<a href="/">FS/</a>')
	if (website_title) {
		document.title = website_title + ' - File Server'
	} else {
		document.title = 'File Server'
	}
	head.add('meta').attr('name', 'description').attr('content', document.title)

	columns = ['Name', 'Date', 'Size']
	
	div = dom.get('div').attr('class', 'container')
	div.add('h1').attr('class', 'page-title').html(titlehtml)
	table = div.add('table').attr('class', 'file-list')
	thead = table.add('thead').add('tr')
	for (i = 0; i < columns.length; i++)
		thead.add('th').add('a').attr('href', 'javascript:sortby('+i+')').html(columns[i] + '<svg class="sort-icon" viewBox="0 0 10 10"><path d="M5 3L8 7H2L5 3Z" fill="currentColor"/></svg>');
	tbody = table.add('tbody')

	var insert = function(filename, datetime, size) {
		var iconSvg = '';
		if (/\/$/.test(filename) || filename == '../') {
			css = 'file-directory';
			iconSvg = '<svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"></path></svg>';
		} else {
			css = 'file';
			iconSvg = '<svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"></path></svg>';
		}

		displayname = decodeURIComponent(filename.replace(/\/$/, ''))
		if (displayname.length > max_name_length)
			displayname = displayname.substring(0, max_name_length-3) + '..>';

		if (!isNaN(Date.parse(datetime))) {
			d = new Date(datetime)
			pad = function (s) {return s < 10 ? '0' + s : s}
			mon = function (m) {return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m]}
			datetime = datetime_format
					.replace('%Y', d.getFullYear())
					.replace('%m', pad(d.getMonth()+1))
					.replace('%d', pad(d.getDate()))
					.replace('%H', pad(d.getHours()))
					.replace('%M', pad(d.getMinutes()))
					.replace('%S', pad(d.getSeconds()))
					.replace('%b', mon(d.getMonth()))
		}

		tr = tbody.add('tr')
		tr.add('td').add('a').attr('class', css).attr('href', filename).html(iconSvg + displayname)
		tr.add('td').text(datetime)
		tr.add('td').text(size == '-' ? '' : size)
	}

	var readme_md = ''
	var readme_js = ''
	insert('../', '', '-')
	for (var i in bodylines) {
		if (m = /\s*<a href="(.+?)">(.+?)<\/a>\s+(\S+)\s+(\S+)\s+(\S+)\s*/.exec(bodylines[i])) {
			filename = decodeURIComponent(m[1])
			datetime = m[3] + ' ' + m[4]
			size = m[5]
			switch (filename.toLowerCase()) {
			  case 'readme.md':
			    readme_md = filename
			    break;
			  case 'readme.js':
			    readme_js = filename
			    break;
			}

			insert(filename, datetime, size)
		}
	}

	document.documentElement.lang = navigator.language
	document.body.appendChild(div.element)

	if (enable_readme && readme_md !== '') {
		xhr = new XMLHttpRequest()
		xhr.open('GET', location.pathname.replace(/[^/]+$/, '')+readme_md, true)
		xhr.onload = function() {
			if (xhr.status < 200 && xhr.status >= 400)
				return
			wait('marked', function() {
				text = xhr.responseText
				begin = text.indexOf('<!--<script>')
				end = text.indexOf("\n</" + "script>-->")
				if (begin != 0) {
					readme = div.add('div').attr('class', 'markdown-body');
					readme.add('h3').text(readme_md);
					readme.add('div').attr('id', 'readme').html(marked.parse(text));
				}
				if (begin < end)
					div.add('script').html(text.substr(begin+4+8, end+1-begin-4-8))
			})
		}
		xhr.send()

		div.add('script').attr('src', 'https://cdnjs.cloudflare.com/ajax/libs/marked/0.5.2/marked.min.js').attr('integrity', 'sha256-zFUosuESzULu5P+SZdjRRtBZR8+1u5RZDlbt3Q5KL8U=').attr('crossorigin', 'anonymous')
		div.add('link').attr('rel', 'stylesheet').attr('href', 'https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown-light.min.css').attr('integrity', 'sha256-WQx0Y6LLZeGv3V3NVVge+YIL5MIOt45RPuFdkyNodls=').attr('crossorigin', 'anonymous')
	}
	if (enable_readme && readme_js !== '') {
		div.add('script').attr('src', readme_js)
	}
}()

function wait(name, callback) {
	var interval = 10; // ms
	window.setTimeout(function() {
		if (window[name] && !(window[name] instanceof HTMLElement)) {
			callback(window[name])
		} else if (window[name] instanceof HTMLElement && window[name].innerHTML) {
			callback(window[name])
		} else {
			window.setTimeout(arguments.callee, interval)
		}
	}, interval)
}

function sortby(index) {
	var tableEl = document.getElementsByClassName('file-list')[0];
	var rows = tableEl.querySelectorAll('tbody tr');
	var headerCells = tableEl.querySelectorAll('thead th');
	var link = headerCells[index].querySelector('a');
	var isDesc = link.getAttribute('data-sort') === 'desc';
	link.setAttribute('data-sort', isDesc ? 'asc' : 'desc');
	
	var sortedRows = Array.from(rows).map(function (row, i) {
		var firstLink = row.querySelector('td:first-child a');
		var type = firstLink && firstLink.classList.contains('file-directory') ? 0 : 1;
		var text = row.querySelectorAll('td')[index].innerText;
		var value;
		if (index === 0) {
			value = firstLink.textContent.trim();
		} else if (index === 1) {
			value = new Date(text).getTime();
		} else if (index === 2) {
			var m = {'G':1024*1024*1024, 'M':1024*1024, 'K':1024};
			value = parseInt(text || 0) * (m[text[text.search(/[KMG]B?$/)]] || 1);
		}
		return {type: type, value: value, index: i, html: row.innerHTML};
	}).sort(function (a, b) {
		if (a.type != b.type)
			return a.type - b.type;
		if (a.value != b.value)
			return isDesc ? (a.value < b.value ? 1 : -1) : (a.value < b.value ? -1 : 1);
		return a.index < b.index ? -1 : 1;
	});
	
	sortedRows.forEach(function (e, i) {
		rows[i].innerHTML = e.html;
	});
}

<style>
